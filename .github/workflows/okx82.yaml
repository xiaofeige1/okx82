name: okx82 screener

on:
  schedule:
    - cron: "18 0,4,8,12 * * *"

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Run Screener
        run: node okx82.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit result
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add result.json

          git diff --cached --quiet || git commit -m "update result"

          git push
